# Runs the test suite on every pull request and on every push to main.
#
# The weekly run exists because requirements.txt uses loose version pins:
# a new lark or pydantic release could change parser behavior, and the
# scheduled run surfaces that even when no one is pushing code.
#
# The backend lives in backend/ (monorepo); all steps run there.
name: tests

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

# If new commits land on the same branch, stop the outdated run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # Linux on the oldest and newest supported Python, plus one
        # Windows job to match the development environment.
        os: [ubuntu-latest]
        python-version: ["3.10", "3.14"]
        include:
          - os: windows-latest
            python-version: "3.14"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest

  api-smoke:
    name: api smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-app.txt
      - run: pip install -r requirements-app.txt httpx
      - run: python scripts/smoke_api.py
        env:
          PLCVC_DATA_DIR: ${{ runner.temp }}/plcvc-data
          PLCVC_JWT_SECRET: ci-smoke-secret-0123456789abcdef0123456789abcdef
